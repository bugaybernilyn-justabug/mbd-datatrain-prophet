name: Update Blood Forecast Predictions

on:
  schedule:
    - cron: "0 0 1 * *" # 1st of every month at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install pandas prophet firebase-admin

      - name: Run forecast script
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python generate_forecast.py

      - name: Commit and push forecast results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add forecast_supply.json forecast_demand.json
          git diff --cached --quiet || git commit -m "chore: update forecast data [skip ci]"
          git push
