name: Update Blood Forecast Predictions

on:
  schedule:
    - cron: "0 0 1 * *" # 1st of every month at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        # ADDED: statsmodels and scikit-learn for the evaluation script
        run: pip install pandas prophet firebase-admin statsmodels scikit-learn

      - name: Run forecast and evaluation scripts
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          python generate_forecast.py
          python evaluate_models.py
       
      - name: Commit and push forecast results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ADDED: model_metrics.json so the accuracy scores are saved to the repo
          git add forecast_supply.json forecast_demand.json model_metrics.json
          git diff --cached --quiet || git commit -m "chore: update forecast and accuracy data [skip ci]"
          git push